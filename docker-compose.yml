version: "3.9"

# Semua service berjalan dalam satu network agar bisa saling resolve hostname
networks:
  pipeline_net:
    driver: bridge

# Persistent volumes untuk ClickHouse dan Grafana
volumes:
  clickhouse_data:
  grafana_data:

services:

  # ---------------------------------------------------------------------------
  # Kafka (KRaft mode — tanpa Zookeeper)
  # ---------------------------------------------------------------------------
  kafka:
    image: bitnami/kafka:latest
    container_name: kafka
    networks:
      - pipeline_net
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      # KRaft mode: Kafka berjalan tanpa Zookeeper
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # Listener untuk komunikasi internal (antar container) dan eksternal (dari host)
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # Konfigurasi topic default
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_NUM_PARTITIONS: ${KAFKA_TOPIC_PARTITIONS:-3}
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_CFG_LOG_RETENTION_MS: ${KAFKA_RETENTION_MS:-604800000}
      KAFKA_CFG_LOG_RETENTION_CHECK_INTERVAL_MS: 300000

      # Ukuran segment dan offset retention
      KAFKA_CFG_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_CFG_OFFSETS_RETENTION_MINUTES: 10080
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # ClickHouse — storage utama dan analytics engine
  # ---------------------------------------------------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: clickhouse
    networks:
      - pipeline_net
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-flight_delay}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      # DDL dijalankan otomatis oleh ClickHouse saat pertama kali start, urutan diatur lewat prefix nama file
      - ./clickhouse/init:/docker-entrypoint-initdb.d
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    depends_on:
      kafka:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Spark — preprocessing, EDA, aggregation
  # ---------------------------------------------------------------------------
  spark:
    image: bitnamilegacy/spark:3.5
    container_name: spark-master
    networks:
      - pipeline_net
    ports:
      - "8080:8080"
      - "7077:7077"
      - "4040:4040"
    environment:
      SPARK_MODE: master
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: 7077
      SPARK_MASTER_WEBUI_PORT: 8080

      # Konfigurasi Python environment di dalam container
      PYSPARK_PYTHON: python3
      PYSPARK_DRIVER_PYTHON: python3

      # Variabel yang dibutuhkan oleh Spark jobs
      CLICKHOUSE_HOST: ${CLICKHOUSE_HOST:-clickhouse}
      CLICKHOUSE_HTTP_PORT: ${CLICKHOUSE_HTTP_PORT:-8123}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-flight_delay}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      DATA_START_YEAR: ${DATA_START_YEAR:-2021}
      DATA_END_YEAR: ${DATA_END_YEAR:-2025}
    volumes:
      # Mount Spark jobs dan data ke dalam container
      - ./spark/jobs:/opt/spark-apps
      - ./spark/conf:/opt/bitnami/spark/conf/custom
      - ./spark/checkpoints:/opt/spark-checkpoints
      - ./data:/opt/data
    depends_on:
      clickhouse:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Grafana — visualisasi dashboard
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    networks:
      - pipeline_net
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Install plugin ClickHouse saat startup; tidak perlu internet setelah image build
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      clickhouse:
        condition: service_healthy
